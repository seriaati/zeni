services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeni
      POSTGRES_PASSWORD: zeni
      POSTGRES_DB: zeni
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeni"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/seriaati/zeni/backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://zeni:zeni@db:5432/zeni
      SECRET_KEY: change-me-in-production-use-a-long-random-string
      CORS_ORIGINS: '["http://localhost"]'
      SIGNUPS_ENABLED: "true"

  frontend:
    image: ghcr.io/seriaati/zeni/frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
